name: Auto-Generate Content

# Runs on the 1st and 15th of every month at 10:00 AM UTC.
# With 14 new posts per run, this keeps a rolling buffer of ~2–4 weeks.
# Also runs automatically from the daily-post job when the buffer runs low
# (see daily-post.yml), and can be triggered manually at any time.

on:
  schedule:
    - cron: "0 10 1,15 * *"   # 1st and 15th of every month, 10:00 AM UTC

  workflow_dispatch:
    inputs:
      count:
        description: "Number of posts to generate"
        required: false
        default: "14"
      force:
        description: "Generate even if buffer is already healthy (true/false)"
        required: false
        default: "false"

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # To commit the new posts file
      models: read      # To call GitHub Models API with GITHUB_TOKEN

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate content
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT="${{ github.event.inputs.count || '14' }}"
          FORCE="${{ github.event.inputs.force || 'false' }}"

          if [ "$FORCE" = "true" ]; then
            echo "🔄 Force mode — generating $COUNT posts regardless of buffer size."
            python src/generate.py --count "$COUNT" --force
          else
            echo "📊 Checking buffer and generating up to $COUNT posts if needed..."
            python src/generate.py --count "$COUNT"
          fi

      - name: Commit new posts
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add content/posts-*.json
          git diff --staged --quiet \
            && echo "ℹ️  No new content to commit (buffer was already sufficient)." \
            || git commit -m "🤖 Auto-generate content batch [skip ci]"
          git push
