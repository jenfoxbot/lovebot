name: Daily Love Post

on:
  schedule:
    # Runs at 6:00 AM PST (14:00 UTC) every day
    # Note: During PDT (daylight saving), this will be 7:00 AM local time
    - cron: '0 14 * * *'
  
  # Allows manual trigger for testing
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    
    # Set permissions for the workflow
    permissions:
      contents: write   # Needed to commit posted.json and new posts files
      models: read      # Needed for the low-buffer auto-generate safety net
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Use a token with write permissions
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'  # Cache pip dependencies
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Post to Bluesky
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: python src/post.py

      # Safety net: if the buffer is running low, generate more content right now
      # so tomorrow's post is never at risk. This runs *after* today's post so it
      # doesn't slow down or block the actual posting step.
      - name: Replenish content if buffer is low
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! python src/generate.py --check; then
            echo "⚠️  Buffer is low — auto-generating a new batch now..."
            python src/generate.py --count 14 --force
          fi

      - name: Commit updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # Stage posted.json AND any newly generated posts-*.json files
          git add content/posted.json content/posts-*.json
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "📝 Daily post update [skip ci]"
          git push
